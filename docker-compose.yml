services:
  web:
    build:
      context: .
    env_file:
      - .env
    ports:
      - "3000:3000"
    depends_on:
      - db

  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: deepprint
      POSTGRES_USER: deepprint
      POSTGRES_PASSWORD: deepprint
    ports:
      - "5432:5432"
    volumes:
      - deepprint_pg:/var/lib/postgresql/data
      - ./migrations-postgres:/docker-entrypoint-initdb.d:ro

volumes:
  deepprint_pg:
